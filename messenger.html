<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriNet | Chats</title>
    <link rel="stylesheet" href="messenger.css">
    
    <!-- Link to the chat logic -->
    <script src="messenger.js" defer></script>
</head>
<body>

    <div class="messenger-container">
        
        <!-- Header Section -->
        <header class="messenger-header">
            <div class="header-top">
                <img src="https://scontent.fmnl12-1.fna.fbcdn.net/v/t1.15752-9/582261148_1339771347258779_5238796933742262933_n.png?..." class="main-logo" alt="AgriNet Logo">
                <div class="header-controls">
                    <span class="user-btn">👤</span>
                    <span class="edit-btn">✎</span>
                </div>
            </div>
            <h1>Chats</h1>
            <div class="search-bar">
                <input type="text" placeholder="Search Messenger">
            </div>
        </header>

        <!-- Dynamic Contacts Area -->
        <main class="contacts-area">

            <!-- CONTACT: Allen Capinpin -->
            <a href="chats.html?me=dan_guevara&with=allen_capinpin" class="contact-link">
                <div class="contact-row">
                    <div class="avatar-container">
                        <img src="https://scontent.fmnl12-1.fna.fbcdn.net/v/t1.15752-9/582261148_1339771347258779_5238796933742262933_n.png?..." class="avatar-lg" alt="Allen">
                    </div>
                    <div class="contact-info">
                        <h2>Allen Capinpin</h2>
                        <p class="unread-badge">1</p>
                    </div>
                </div>
            </a>

            <!-- CONTACT: Kels -->
            <a href="chats.html?me=dan_guevara&with=kels" class="contact-link">
                <div class="contact-row">
                    <div class="avatar-container">
                        <img src="https://scontent.fmnl12-1.fna.fbcdn.net/v/t1.15752-9/582261148_1339771347258779_5238796933742262933_n.png?..." class="avatar-lg" alt="Kels">
                    </div>
                    <div class="contact-info">
                        <h2>Kels</h2>
                    </div>
                </div>
            </a>

            <!-- CONTACT: Calix -->
            <a href="chats.html?me=dan_guevara&with=calix" class="contact-link">
                <div class="contact-row">
                    <div class="avatar-container">
                        <img src="https://scontent.fmnl12-1.fna.fbcdn.net/v/t1.15752-9/582261148_1339771347258779_5238796933742262933_n.png?..." class="avatar-lg" alt="Calix">
                    </div>
                    <div class="contact-info">
                        <h2>Calix</h2>
                    </div>
                </div>
            </a>

        </main>

    </div>
</body>
</html>
